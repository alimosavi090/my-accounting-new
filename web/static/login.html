<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل مدیریت — VPN Accounting</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(67, 97, 238, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(6, 214, 160, 0.1), transparent 40%),
                        var(--bg-primary);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(12px);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }

        .login-logo svg {
            width: 32px;
            height: 32px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-2);
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            margin-top: 24px;
        }

        .error-message {
            color: var(--red);
            background: rgba(239, 71, 111, 0.1);
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
            border: 1px solid rgba(239, 71, 111, 0.2);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h1 class="login-title">ورود به سیستم</h1>
            <p class="login-subtitle">جهت دسترسی به پنل حسابداری اطلاعات خود را وارد کنید.</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">نام کاربری</label>
                <input type="text" id="username" class="form-input ltr text-right" placeholder="admin" required autocomplete="username" autofocus>
            </div>

            <div class="form-group" style="margin-bottom: 8px;">
                <label class="form-label">رمز عبور</label>
                <input type="password" id="password" class="form-input ltr text-right" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                ورود به داشبورد
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>
    </div>

    <script>
        // در صورتی که کاربر قبلا لاگین کرده باشد
        if (localStorage.getItem('vpn_token')) {
            window.location.href = '/';
        }

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';
            btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></span> در حال بررسی...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'خطا در ارتباط با سرور');
                }

                // ذخیره توکن و هدایت به پنل
                localStorage.setItem('vpn_token', data.token);
                localStorage.setItem('vpn_user', JSON.stringify(data.user));
                window.location.href = '/';

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.innerHTML = 'ورود به داشبورد <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
